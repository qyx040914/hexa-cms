##
# Class18 Gzip Settings
# Put these directives inside the http block in /etc/nginx/nginx.conf,
# or keep them inside the server block when using class18-nginx-static-spa.conf.
##

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;
