<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Class17 Nginx Basic Server</title>
    <style>
      body {
        align-items: center;
        background: #f0f4f8;
        color: #172033;
        display: flex;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        max-width: 680px;
        padding: 36px;
        text-align: center;
      }

      h1 {
        font-size: 30px;
        margin: 0 0 12px;
      }

      p {
        color: #475569;
        font-size: 18px;
        line-height: 1.7;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello，这是钱宇歆的第一个公网服务器！</h1>
      <p>Nginx 已成功监听 80 端口，并通过 root 与 index 指令托管静态页面。</p>
    </main>
  </body>
</html>
